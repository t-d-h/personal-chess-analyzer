version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Personal Chess Analyzer — Docker Compose
#
# Services
#   frontend        React/TS UI                       :3000
#   api-gateway     Node/TS Fastify HTTP layer         :8080
#   analyze-service C worker pool (Stockfish + Redis)  (no public port)
#   redis           Redis 7 Streams + job progress     :6379 (host-only dev)
#   mongodb         MongoDB 7 game storage             :27017 (host-only dev)
#
# Usage
#   Dev:        docker compose -f deploy/docker-compose.yml up
#   Scale:      docker compose -f deploy/docker-compose.yml up --scale analyze-service=4
#   Prod-build: docker compose -f deploy/docker-compose.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
      target: production          # multi-stage: dev | production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    image: chess-analyzer/frontend:${TAG:-latest}
    container_name: chess-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../src/api-gateway
      dockerfile: Dockerfile
      target: production
    image: chess-analyzer/api-gateway:${TAG:-latest}
    container_name: chess-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV:          ${NODE_ENV:-production}
      PORT:              8080
      REDIS_URL:         redis://redis:6379
      MONGO_URL:         mongodb://mongodb:27017/chess_analyzer
      RATE_LIMIT_MAX:    ${RATE_LIMIT_MAX:-20}        # requests per window
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}  # ms
      MAX_PGN_PLIES:     ${MAX_PGN_PLIES:-300}
      MAX_PGN_BYTES:     ${MAX_PGN_BYTES:-524288}     # 512 KB
      LOG_LEVEL:         ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ── Analyze Service (C) ─────────────────────────────────────────────────────
  analyze-service:
    build:
      context: ../src/analyze-service
      dockerfile: Dockerfile       # compiles the C binary + bundles Stockfish
    image: chess-analyzer/analyze-service:${TAG:-latest}
    container_name: chess-analyze
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      REDIS_URL:              redis://redis:6379
      MONGO_URL:              mongodb://mongodb:27017/chess_analyzer
      STOCKFISH_PATH:         ${STOCKFISH_PATH:-/usr/local/bin/stockfish}
      WORKER_CONCURRENCY:     ${WORKER_CONCURRENCY:-4}
      STREAM_KEY:             ${STREAM_KEY:-chess:jobs}
      CONSUMER_GROUP:         ${CONSUMER_GROUP:-analyze-workers}
      ENGINE_DEPTH:           ${ENGINE_DEPTH:-18}
      ENGINE_MULTIPV:         ${ENGINE_MULTIPV:-2}
      PER_MOVE_TIMEOUT_MS:    ${PER_MOVE_TIMEOUT_MS:-5000}
      PER_JOB_TIMEOUT_S:      ${PER_JOB_TIMEOUT_S:-300}
      BOOK_PLIES:             ${BOOK_PLIES:-10}
      LOG_LEVEL:              ${LOG_LEVEL:-info}
    deploy:
      replicas: ${ANALYZE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${ANALYZE_CPU_LIMIT:-2.0}"
          memory: "${ANALYZE_MEM_LIMIT:-512M}"
        reservations:
          cpus: "0.5"
          memory: "128M"
    healthcheck:
      # The binary writes a liveness file on each successful loop iteration
      test: ["CMD", "test", "-f", "/tmp/analyze-alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chess-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory ${REDIS_MAX_MEM:-256mb}
        --maxmemory-policy allkeys-lru
        --save 60 1
        --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"   # exposed for local dev tools only
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27018}:27017"  # exposed for local dev tools only
    environment:
      MONGO_INITDB_DATABASE: chess_analyzer
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  default:
    name: chess-analyzer-net
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    name: chess-redis-data
  mongo-data:
    name: chess-mongo-data
