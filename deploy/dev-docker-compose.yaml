version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=chess_analyzer
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ../src/api-gateway
    ports:
      - "18080:18080"
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/chess_analyzer
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  analyze-service:
    build:
      context: ../src/analyze-service
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/chess_analyzer
      - STOCKFISH_PATH=/usr/games/stockfish
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ../src/frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
  redis_data:
